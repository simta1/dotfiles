general {
    hide_cursor = false
    ignore_empty_input = true
    disable_loading = true
    fail_timeout = 500
}

auth {
    fingerprint:enabled = true
}

background {
    monitor = 
    path = ~/Pictures/wallpapers/bg_lock.jpg
}

# image {
#     monitor =
#     path = ~/Pictures/wallpapers/bg_space.jpg
#     size = 150
#     rounding = -1
#     border_size = 0
#     position = -800, -500
# }

input-field {
    monitor =
    size = 400, 50
    outline_thickness = 2
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = -5, -400
}

label {
    monitor =
    text = attempts: $ATTEMPTS $FAIL
    position = 10, 10
    halign = left
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT
    position = -10, 10
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    position = -5, 15
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%Y/%m/%d(%a)")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 24
    position = -5, -85
}

